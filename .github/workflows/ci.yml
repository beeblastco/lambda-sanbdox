name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger to force an image rebuild + multi-region ECR push. Used to
  # bootstrap a new region: deploy the filthy-panty SST app there first (creates
  # the ECR repo), add the region to the ECR_REGIONS repo variable, then run this
  # to mirror the image in, then re-deploy with SANDBOX_IMAGE_READY(_<STAGE>)=true.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Region used only to assume the OIDC role (region-agnostic). ECR pushes target
  # every region in ECR_REGIONS below.
  AWS_REGION: eu-central-1
  # Comma/space-separated list of regions to push the image to. Each region has its
  # own repo `beeblast-lambda-sandbox-<account>-<region>`. A region whose repo does
  # not exist yet is skipped with a warning (the filthy-panty SST app owns repo
  # creation). Defaults to eu-central-1 when the repo variable is unset.
  ECR_REGIONS: ${{ vars.ECR_REGIONS || 'eu-central-1' }}

jobs:
  # ─── Rust checks (always runs) ───
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  # ─── Detect Docker-relevant changes ───
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker: ${{ steps.decide.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            docker:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - '.dockerignore'
      # A manual run forces docker=true so the build + ECR push always happens.
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=${{ steps.filter.outputs.docker }}" >> "$GITHUB_OUTPUT"
          fi

  # ─── Docker build & smoke test (PRs only, image-relevant changes only) ───
  docker-build:
    runs-on: ubuntu-latest
    needs: [rust-checks, changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
    env:
      DOCKER_PLATFORM: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build arm64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: lambda-microvm-agent-sandbox:local
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.DOCKER_PLATFORM }}
          provenance: false
          sbom: false

      - name: Smoke test
        run: |
          # The Lambda MicroVM base image is arm64-only. GitHub's x64 runners run
          # this container through QEMU, which is enough for the stateless smoke test.
          docker run -d --name sandbox-smoke -p 8080:8080 -p 9000:9000 lambda-microvm-agent-sandbox:local
          sleep 4
          # Lifecycle /ready hook is up (200).
          curl -fsS -X POST "http://localhost:9000/aws/lambda-microvms/runtime/v1/ready" -o /dev/null
          # Exec API returns ok:true for a stateless run.
          curl -fsS -X POST "http://localhost:8080/exec" \
            -H 'content-type: application/json' \
            -d '{"runtime":"bash","code":"echo hello; node -v; python3 --version","timeout_ms":30000}' | grep '"ok":true'
          docker rm -f sandbox-smoke

  # ─── Arm64 build & push to every ECR_REGIONS region + GHCR (main only) ───
  build-platform:
    runs-on: ubuntu-latest
    needs: [rust-checks, changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      DOCKER_PLATFORM: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the metadata `images` list: GHCR always, plus every ECR_REGIONS region
      # whose repo already exists (skip + warn otherwise). Logs in to each region's ECR.
      - name: Resolve ECR push targets
        id: targets
        env:
          AWS_ACCOUNT_ID_VAR: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_ACCOUNT_ID_SECRET: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ACCOUNT_ID="${AWS_ACCOUNT_ID_VAR:-${AWS_ACCOUNT_ID_SECRET:-}}"
          if [ -z "$ACCOUNT_ID" ]; then
            echo "::error::AWS_ACCOUNT_ID must be set as a repository variable or secret."
            exit 1
          fi

          IMAGES="${REGISTRY}/${IMAGE_NAME}"
          for region in $(echo "${ECR_REGIONS}" | tr ',' ' '); do
            [ -z "$region" ] && continue
            repo="beeblast-lambda-sandbox-${ACCOUNT_ID}-${region}"
            registry="${ACCOUNT_ID}.dkr.ecr.${region}.amazonaws.com"
            if aws ecr describe-repositories --repository-names "$repo" --region "$region" >/dev/null 2>&1; then
              aws ecr get-login-password --region "$region" | docker login --username AWS --password-stdin "$registry"
              IMAGES="${IMAGES}"$'\n'"${registry}/${repo}"
              echo "::notice::ECR target: ${region} (${repo})"
            else
              echo "::warning::Skipping ECR ${region}: repo ${repo} does not exist yet — deploy the filthy-panty SST app in that region first."
            fi
          done

          {
            echo "images<<EOF"
            echo "$IMAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.targets.outputs.images }}
          tags: |
            type=sha,prefix=,suffix=-arm64
            type=raw,value=latest-arm64,enable={{is_default_branch}}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.DOCKER_PLATFORM }}
          provenance: false
          sbom: false

  # ─── Create default arm64 aliases, per registry (main only) ───
  create-manifest:
    runs-on: ubuntu-latest
    needs: [build-platform]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push default arm64 aliases
        env:
          AWS_ACCOUNT_ID_VAR: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_ACCOUNT_ID_SECRET: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # build-platform tags with docker/metadata-action `type=sha`, which is the
          # SHORT (7-char) sha. The MicroVM managed base currently publishes only
          # linux/arm64, so the default tags are aliases of the arm64 image.
          SHA="${GITHUB_SHA::7}"

          combine() { # <repo-base>
            local base="$1"
            for tag in "$SHA" latest; do
              docker buildx imagetools create -t "${base}:${tag}" \
                "${base}:${tag}-arm64"
              docker buildx imagetools inspect "${base}:${tag}"
            done
          }

          # ── GHCR aliases (once) ──
          combine "${REGISTRY}/${IMAGE_NAME}"

          # ── ECR aliases (per existing ECR_REGIONS region) ──
          ACCOUNT_ID="${AWS_ACCOUNT_ID_VAR:-${AWS_ACCOUNT_ID_SECRET:-}}"
          if [ -z "$ACCOUNT_ID" ]; then
            echo "::error::AWS_ACCOUNT_ID must be set as a repository variable or secret."
            exit 1
          fi
          for region in $(echo "${ECR_REGIONS}" | tr ',' ' '); do
            [ -z "$region" ] && continue
            repo="beeblast-lambda-sandbox-${ACCOUNT_ID}-${region}"
            registry="${ACCOUNT_ID}.dkr.ecr.${region}.amazonaws.com"
            if aws ecr describe-repositories --repository-names "$repo" --region "$region" >/dev/null 2>&1; then
              aws ecr get-login-password --region "$region" | docker login --username AWS --password-stdin "$registry"
              combine "${registry}/${repo}"
              echo "::notice::ECR aliases created in ${region} (${repo})"
            else
              echo "::warning::Skipping ECR ${region}: repo ${repo} does not exist."
            fi
          done
