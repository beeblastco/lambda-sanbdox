name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # AWS defaults (override via repo vars). Required secrets: AWS_ROLE_ARN.
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}

jobs:
  # ─── Rust checks (always runs) ───
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  # ─── Detect Docker-relevant changes ───
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - '.dockerignore'

  # ─── Docker build & smoke test (PRs only, image-relevant changes only) ───
  docker-build:
    runs-on: ubuntu-latest
    needs: [rust-checks, changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: lambda-agent-sandbox:local
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Smoke test (bash + node + python)
        run: |
          docker run -d --name lambda-smoke -p 9000:8080 lambda-agent-sandbox:local
          sleep 6
          curl -s -X POST "http://localhost:9000/2015-03-31/functions/function/invocations" \
            -d '{"runtime":"bash","code":"echo hello; node -v; python3 --version","timeout_ms":30000}' | grep '"ok":true'
          docker rm -f lambda-smoke

  # ─── Build & push multi-arch image to GHCR + ECR (main only, image-relevant changes only) ───
  push-image:
    runs-on: ubuntu-latest
    needs: [rust-checks, changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      ECR_REPOSITORY: beeblast-lambda-sandbox-${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}-${{ env.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
