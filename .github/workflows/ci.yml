name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger to force an image rebuild + ECR push. Used to bootstrap a new
  # region: deploy the filthy-panty SST app first (creates the ECR repo), then run
  # this to mirror the image in, then re-deploy with SANDBOX_IMAGE_READY=true.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: eu-central-1

jobs:
  # ─── Rust checks (always runs) ───
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  # ─── Detect Docker-relevant changes ───
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker: ${{ steps.decide.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            docker:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - '.dockerignore'
      # A manual run forces docker=true so the build + ECR push always happens.
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=${{ steps.filter.outputs.docker }}" >> "$GITHUB_OUTPUT"
          fi

  # ─── Parallel Docker build & smoke test (PRs only, image-relevant changes only) ───
  docker-build:
    runs-on: ubuntu-latest
    needs: [rust-checks, changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.platform }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: lambda-agent-sandbox:local
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false

      - name: Smoke test (amd64 only)
        if: matrix.platform == 'linux/amd64'
        run: |
          # Override entrypoint with RIE for local testing — production uses bootstrap directly
          docker run -d --name lambda-smoke -p 9000:8080 \
            --entrypoint /usr/local/bin/aws-lambda-rie \
            lambda-agent-sandbox:local /var/runtime/bootstrap
          sleep 6
          curl -s -X POST "http://localhost:9000/2015-03-31/functions/function/invocations" \
            -d '{"runtime":"bash","code":"echo hello; node -v; python3 --version","timeout_ms":30000}' | grep '"ok":true'
          docker rm -f lambda-smoke

  # ─── Parallel per-platform build & push (main only, image-relevant changes only) ───
  build-platform:
    runs-on: ubuntu-latest
    needs: [rust-checks, changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    outputs:
      ecr-repo: ${{ steps.ecr-repo.outputs.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute ECR repository name
        id: ecr-repo
        env:
          AWS_ACCOUNT_ID_VAR: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_ACCOUNT_ID_SECRET: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          ACCOUNT_ID="${AWS_ACCOUNT_ID_VAR}"
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID="${AWS_ACCOUNT_ID_SECRET}"
          fi
          if [ -z "$ACCOUNT_ID" ]; then
            echo "Error: AWS_ACCOUNT_ID must be set as a repository variable or secret."
            exit 1
          fi
          echo "repository=beeblast-lambda-sandbox-${ACCOUNT_ID}-${AWS_REGION}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ steps.ecr-repo.outputs.repository }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ steps.ecr-repo.outputs.repository }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.ecr-repo.outputs.repository }}
          tags: |
            type=sha,prefix=,suffix=-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            type=raw,value=latest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},enable={{is_default_branch}}

      - name: Build and push ${{ matrix.platform }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false

  # ─── Combine per-platform images into multi-arch manifests (main only) ───
  create-manifest:
    runs-on: ubuntu-latest
    needs: [build-platform]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ needs.build-platform.outputs.ecr-repo }}
        run: |
          SHA="${{ github.sha }}"

          # ── GHCR manifests ──

          # SHA tag
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}-arm64
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}

          # latest tag
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # ── ECR manifests ──

          # SHA tag
          docker buildx imagetools create \
            -t ${ECR_REGISTRY}/${ECR_REPO}:${SHA} \
            ${ECR_REGISTRY}/${ECR_REPO}:${SHA}-amd64 \
            ${ECR_REGISTRY}/${ECR_REPO}:${SHA}-arm64
          docker buildx imagetools inspect ${ECR_REGISTRY}/${ECR_REPO}:${SHA}

          # latest tag
          docker buildx imagetools create \
            -t ${ECR_REGISTRY}/${ECR_REPO}:latest \
            ${ECR_REGISTRY}/${ECR_REPO}:latest-amd64 \
            ${ECR_REGISTRY}/${ECR_REPO}:latest-arm64
          docker buildx imagetools inspect ${ECR_REGISTRY}/${ECR_REPO}:latest
