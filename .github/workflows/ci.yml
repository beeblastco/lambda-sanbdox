name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: eu-central-1

jobs:
  # ─── Rust checks (always runs) ───
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  # ─── Detect Docker-relevant changes ───
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - '.dockerignore'

  # ─── Parallel Docker build & smoke test (PRs only, image-relevant changes only) ───
  docker-build:
    runs-on: ubuntu-latest
    needs: [rust-checks, changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.platform }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: lambda-agent-sandbox:local
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false

      - name: Smoke test (amd64 only)
        if: matrix.platform == 'linux/amd64'
        run: |
          # Override entrypoint with RIE for local testing — production uses bootstrap directly
          docker run -d --name lambda-smoke -p 9000:8080 \
            --entrypoint /usr/local/bin/aws-lambda-rie \
            lambda-agent-sandbox:local /var/runtime/bootstrap
          sleep 6
          curl -s -X POST "http://localhost:9000/2015-03-31/functions/function/invocations" \
            -d '{"runtime":"bash","code":"echo hello; node -v; python3 --version","timeout_ms":30000}' | grep '"ok":true'
          docker rm -f lambda-smoke

  # ─── Parallel per-platform build & push (main only, image-relevant changes only) ───
  build-platform:
    runs-on: ubuntu-latest
    needs: [rust-checks, changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    outputs:
      ecr-public-repo: ${{ steps.ecr-public.outputs.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Compute ECR Public repo URI
        id: ecr-public
        run: |
          ALIAS=$(aws ecr-public describe-registries --region us-east-1 \
            --query 'registries[0].aliases[0].name' --output text)
          echo "repository=public.ecr.aws/${ALIAS}/beeblast-lambda-sandbox" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ steps.ecr-public.outputs.repository }}
          tags: |
            type=sha,prefix=,suffix=-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            type=raw,value=latest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},enable={{is_default_branch}}

      - name: Build and push ${{ matrix.platform }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false

  # ─── Combine per-platform images into multi-arch manifests (main only) ───
  create-manifest:
    runs-on: ubuntu-latest
    needs: [build-platform]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        env:
          ECR_PUBLIC_REPO: ${{ needs.build-platform.outputs.ecr-public-repo }}
        run: |
          SHA="${{ github.sha }}"

          # ── GHCR manifests ──

          # SHA tag
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}-arm64
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}

          # latest tag
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # ── ECR Public manifests ──

          # SHA tag
          docker buildx imagetools create \
            -t ${ECR_PUBLIC_REPO}:${SHA} \
            ${ECR_PUBLIC_REPO}:${SHA}-amd64 \
            ${ECR_PUBLIC_REPO}:${SHA}-arm64
          docker buildx imagetools inspect ${ECR_PUBLIC_REPO}:${SHA}

          # latest tag
          docker buildx imagetools create \
            -t ${ECR_PUBLIC_REPO}:latest \
            ${ECR_PUBLIC_REPO}:latest-amd64 \
            ${ECR_PUBLIC_REPO}:latest-arm64
          docker buildx imagetools inspect ${ECR_PUBLIC_REPO}:latest
